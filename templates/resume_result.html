{% extends 'base.html' %}

{% block content %}

<h2>Resume Skill Analysis</h2>

{% for skill,score in skills.items %}

<div class="mb-3">

<h5>{{ skill|title }}</h5>

<div class="progress">

<div class="progress-bar bg-success" 
role="progressbar" 
style="width: {{ score }}%">

{{ score }}%

</div>

</div>

</div>

{% endfor %}

<a href="/dashboard/" class="btn btn-primary mt-3">
Back to Dashboard
</a>

{% endblock %}
