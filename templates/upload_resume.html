{% extends 'base.html' %}

{% block content %}

<h2>Upload Resume</h2>

{% if error %}
<div class="alert alert-danger">
    {{ error }}
</div>
{% endif %}

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<input type="file" name="resume" class="form-control">

<br>

<button class="btn btn-primary">Upload</button>

</form>

{% endblock %}
